<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>July Sunflowers</title>
    <script>
      // SPA fallback for static hosts (GitHub Pages, plain file hosting, ...).
      // Deep links like /product/f-10 have no file on disk, so the host serves
      // this 404. We encode the requested path into a query string and bounce
      // back to the app root, where index.html restores the real URL.
      // Technique: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
