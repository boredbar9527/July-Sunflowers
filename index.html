<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>July Sunflowers | Wholesale Foodservice Packaging &amp; Supplies</title>
    <meta
      name="description"
      content="July Sunflowers — wholesale foodservice packaging and disposables shipped by the case: containers, cups, cutlery, bags, napkins, and back-of-house supplies from Chino, California."
    />
    <meta
      name="keywords"
      content="foodservice packaging, wholesale disposables, take-out containers, paper cups, cutlery, portion cups, kraft bags, restaurant supply"
    />
    <meta name="author" content="July Sunflowers" />
    <meta name="theme-color" content="#234d27" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      // Restore the real path after a 404.html redirect (static-host SPA support).
      // Runs before the app so Vue's router logic sees the correct location.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
