<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>July Sunflowers | Sunny Softness, Reimagined</title>
    <meta
      name="description"
      content="July Sunflowers offers premium facial tissue and bath tissue with a warmer, cleaner, more intentional brand experience."
    />
    <meta
      name="keywords"
      content="July Sunflowers, facial tissue, bath tissue, premium tissue, eco-friendly tissue, septic safe"
    />
    <meta name="author" content="July Sunflowers" />
    <meta name="theme-color" content="#0f7a58" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      // Restore the real path after a 404.html redirect (static-host SPA support).
      // Runs before the app so Vue's router logic sees the correct location.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
